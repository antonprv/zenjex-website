<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki — Zenjex</title>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/wiki.css" />
</head>
<body>

<div class="app">

  <!-- ════════════════════════════════════════
       TOP BAR
  ════════════════════════════════════════ -->
  <header class="topbar">

    <div class="topbar-left">

      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle article list" onclick="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>

      <a class="topbar-logo" id="portfolio-link" href="#" aria-label="Back to portfolio">
        <span class="topbar-logo-name">
          <span id="topbar-project">…</span>
        </span>
      </a>

      <div class="topbar-sep"></div>
      <span class="topbar-label t" data-ru="Wiki" data-en="Wiki">Wiki</span>

    </div>

    <div class="topbar-right">

      <!-- Nav: Changelog ↔ Wiki -->
      <nav class="topbar-nav" aria-label="Site navigation">
        <a class="topbar-nav-link" href="index.html">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
          </svg>
          <span class="t" data-ru="Changelog" data-en="Changelog">Changelog</span>
        </a>
        <a class="topbar-nav-link topbar-nav-link--active" href="wiki.html">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
          </svg>
          <span class="t" data-ru="Wiki" data-en="Wiki">Wiki</span>
        </a>
      </nav>

      <a class="repo-link" id="repo-link" href="#" target="_blank" rel="noopener" aria-label="GitHub repository">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.3 9.4 7.9 10.9.58.1.79-.25.79-.56v-2c-3.2.7-3.88-1.54-3.88-1.54-.52-1.34-1.28-1.7-1.28-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.2 1.77 1.2 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 5.74 0C17.3 5.37 18.26 5.68 18.26 5.68c.62 1.58.23 2.75.11 3.04.74.8 1.18 1.83 1.18 3.08 0 4.41-2.69 5.38-5.25 5.67.41.35.78 1.05.78 2.12v3.15c0 .31.21.67.8.56C20.2 21.4 23.5 17.1 23.5 12 23.5 5.65 18.35.5 12 .5z"/>
        </svg>
        GitHub
      </a>

      <div class="lang-switcher" role="group" aria-label="Language">
        <button class="lang-btn active" id="btn-ru" onclick="setLang('ru')">RU</button>
        <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
      </div>

      <button class="theme-switcher" id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
        <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

    </div>
  </header>

  <div class="main">

    <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar" aria-label="Article list">
      <p class="sidebar-section-label t" data-ru="Статьи" data-en="Articles">Статьи</p>
      <ul class="version-list" id="article-list" role="list"></ul>
    </nav>

    <main class="content wiki-content" id="article-content" aria-live="polite">
      <!-- Filled by wiki.js -->
    </main>

  </div>

  <footer>
    <span class="t" id="footer-text" data-ru="" data-en=""></span>
  </footer>

</div>

<script src="js/theme.js"></script>
<script src="js/wiki-loader.js"></script>
<script src="js/lang.js"></script>
<script src="js/wiki.js"></script>
<script src="js/scroll.js"></script>

<script>
  function toggleSidebar() {
    const sidebar  = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    const toggle   = document.getElementById('sidebar-toggle');
    const open = sidebar.classList.toggle('open');
    backdrop.classList.toggle('open', open);
    toggle.classList.toggle('open', open);
  }
</script>

<script>
  (function wireFooter() {
    const poll = setInterval(() => {
      const cfg = window.__cfg;
      if (!cfg) return;
      clearInterval(poll);
      const p = cfg.site?.project || 'Zenjex';
      const footerEl = document.getElementById('footer-text');
      if (footerEl) {
        const yr = new Date().getFullYear();
        footerEl.setAttribute('data-ru', `© ${yr}\u00a0${p}\u00a0—\u00a0wiki`);
        footerEl.setAttribute('data-en', `© ${yr}\u00a0${p}\u00a0—\u00a0wiki`);
        footerEl.textContent = footerEl.getAttribute('data-' + (window.getCurrentLang?.() || 'ru'));
      }
    }, 30);
  })();
</script>

<script>
  window.addEventListener('pageshow', () => {
    document.getElementById('page-transition')?.classList.remove('active');
  });
</script>

</body>
</html>
